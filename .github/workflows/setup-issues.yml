# Crea issues de la actividad para repos creados desde GitHub Classroom.
# Idempotente: crea solamente los issues faltantes por título.
name: Setup assignment issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: setup-issues-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ensure-assignment-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Crear issues faltantes de la actividad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json
          import os
          import textwrap
          import urllib.error
          import urllib.parse
          import urllib.request

          REPO = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          API = "https://api.github.com"
          ISSUE_LABEL = "classroom-assignment"

          ISSUES = [
              {
                  "title": "[Entrega] Archivos base y estructura de carpetas",
                  "body": """
          ## Objetivo
          Partir del proyecto base sin romper la estructura esperada.

          ## Qué debe cumplirse
          - [ ] Existe `index.html` en la **raíz** del repositorio.
          - [ ] Existe una carpeta `css/`.
          - [ ] Existe una carpeta `img/`.

          ## Criterio automático
          `bash scripts/classroom-check.sh base-structure` → `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Hoja de estilos base enlazada",
                  "body": """
          ## Objetivo
          Mantener los estilos en `css/style_base.css` y enlazarlos desde el HTML.

          ## Qué debe cumplirse
          - [ ] Existe `css/style_base.css`.
          - [ ] En `index.html` hay un `<link rel="stylesheet" href="css/style_base.css" ...>` (ruta equivalente permitida).

          ## Criterio automático
          `bash scripts/classroom-check.sh css-linked` → `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Estructura semántica HTML",
                  "body": """
          ## Objetivo
          Conservar la semántica del maquetado.

          ## Qué debe cumplirse
          - [ ] Uso de `<header>`.
          - [ ] Al menos un `<section>`.
          - [ ] Uso de `<footer>`.

          ## Criterio automático
          `bash scripts/classroom-check.sh semantic-html` → `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Flexbox en el encabezado",
                  "body": """
          ## Objetivo
          Alinear logo y navegación con Flexbox según la consigna.

          ## Qué debe cumplirse
          - [ ] En `header { ... }`: `display: flex` (o `inline-flex`).
          - [ ] En `header nav ul { ... }`: `display: flex` (o `inline-flex`).
          - [ ] En `header .header__logo { ... }`: `display: flex` (o `inline-flex`).

          ## Referencia visual
          Compará con el diseño en Figma (enlace en README).

          ## Criterio automático
          `bash scripts/classroom-check.sh flexbox-header` → `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Flexbox en el contenido principal",
                  "body": """
          ## Objetivo
          Organizar cards, podio y ranking con Flexbox.

          ## Qué debe cumplirse
          - [ ] `main .container { ... }` con `display: flex` (o `inline-flex`).
          - [ ] `main section .podio { ... }` con `display: flex` (o `inline-flex`).
          - [ ] `.top5 { ... }` con `display: flex` (o `inline-flex`).
          - [ ] `.top5 .podio__img { ... }` con `display: flex` (o `inline-flex`).

          ## Criterio automático
          `bash scripts/classroom-check.sh flexbox-main` → `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Flexbox en el pie de página",
                  "body": """
          ## Objetivo
          Distribuir logo y menú del footer con Flexbox.

          ## Qué debe cumplirse
          - [ ] `footer { ... }` con `display: flex` (o `inline-flex`).
          - [ ] `footer .footer__logo { ... }` con `display: flex` (o `inline-flex`).
          - [ ] `footer ul { ... }` con `display: flex` (o `inline-flex`).

          ## Criterio automático
          `bash scripts/classroom-check.sh flexbox-footer` → `CORRECTO`.""",
              },
              {
                  "title": "[Revisión docente] Figma, proporciones y detalle visual",
                  "body": """
          ## Objetivo
          Cerrar la corrección con criterio humano: fidelidad al diseño y buenas prácticas.

          ## Checklist sugerida
          - [ ] Alineación razonable con el archivo de Figma indicado en el README (vista principal de referencia).
          - [ ] Espaciados, jerarquía tipográfica y detalle visual más allá del mínimo verificado por script.
          - [ ] Imágenes/recursos (`img/`) coherentes con la consigna y sin rutas rotas.

          ## Nota
          Los tests de GitHub Classroom **no sustituyen** esta revisión: validan presencia de Flexbox en los bloques indicados, no el parecido pixel-perfect con Figma.""",
              },
          ]

          for _spec in ISSUES:
              _spec["body"] = textwrap.dedent(_spec["body"]).strip()

          def request(method, url, data=None):
              headers = {
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              body = None
              if data is not None:
                  headers["Content-Type"] = "application/json; charset=utf-8"
                  body = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def list_existing_issue_titles():
              titles = set()
              page = 1
              while True:
                  url = f"{API}/repos/{REPO}/issues?state=all&per_page=100&page={page}"
                  headers = {
                      "Authorization": f"Bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  }
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      batch = json.loads(resp.read().decode())
                  if not batch:
                      break
                  for item in batch:
                      if item.get("pull_request") is None:
                          title = item.get("title", "").strip()
                          if title:
                              titles.add(title)
                  if len(batch) < 100:
                      break
                  page += 1
              return titles

          def ensure_label_exists(label_name):
              url = f"{API}/repos/{REPO}/labels/{urllib.parse.quote(label_name)}"
              try:
                  request("GET", url)
                  return
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise
              request(
                  "POST",
                  f"{API}/repos/{REPO}/labels",
                  {
                      "name": label_name,
                      "color": "1d76db",
                      "description": "Issue generado automaticamente para la actividad de Classroom",
                  },
              )
              print(f"Etiqueta creada: {label_name}")

          existing_titles = list_existing_issue_titles()
          ensure_label_exists(ISSUE_LABEL)

          created_count = 0
          skipped_count = 0
          for spec in ISSUES:
              if spec["title"] in existing_titles:
                  skipped_count += 1
                  print("Ya existe, se omite: " + spec["title"])
                  continue
              url = f"{API}/repos/{REPO}/issues"
              created = request(
                  "POST",
                  url,
                  {"title": spec["title"], "body": spec["body"], "labels": [ISSUE_LABEL]},
              )
              created_count += 1
              print("Creado issue #" + str(created["number"]) + ": " + spec["title"])
          print(
              "Listo: "
              + str(created_count)
              + " issue(s) creado(s), "
              + str(skipped_count)
              + " ya existentes."
          )
          PY
